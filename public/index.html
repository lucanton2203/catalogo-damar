<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo | Distribuidora DAMAR</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/images/logo.png" alt="Damar" onerror="this.style.display='none'" />
      <div>
        <h1>Distribuidora DAMAR</h1>
        <p>Catálogo de productos</p>
      </div>
    </div>
    <div class="meta" id="metaInfo">Cargando catálogo...</div>
  </header>

  <main class="container">
    <section class="search-panel">
      <label for="searchInput">Buscar por código o descripción</label>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Ej: 7791234567890 o shampoo..." />
        <button id="exportPdfBtn" class="btn-export" title="Exportar lista actual a PDF">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          Exportar PDF
        </button>
      </div>
    </section>

    <section id="status" class="status"></section>
    <section id="productsGrid" class="grid"></section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="img-wrapper"><img class="product-img" src="" alt="" /><div class="img-placeholder">Sin imagen</div></div>
      <div class="card-body">
        <div class="code"></div>
        <h2 class="desc"></h2>
        <div class="price"></div>
        <button class="btn-add-cart" type="button">+ Agregar</button>
      </div>
    </article>
  </template>

  <!-- Cart: overlay de fondo -->
  <div id="cartOverlay" class="cart-overlay"></div>

  <!-- Cart: panel lateral -->
  <div id="cartPanel" class="cart-panel" role="dialog" aria-label="Carrito de compras">
    <div class="cart-header">
      <h2 class="cart-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Mi pedido
      </h2>
      <button id="cartClose" class="cart-close-btn" title="Cerrar">✕</button>
    </div>
    <div id="cartItemsList" class="cart-items"></div>
    <div class="cart-footer">
      <div id="cartTotal" class="cart-total-line"></div>
      <div class="cart-actions">
        <button id="cartClearBtn" class="btn-clear-cart">Vaciar</button>
        <button id="cartSendBtn" class="btn-send-order">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pedido
        </button>
      </div>
    </div>
  </div>

  <!-- Cart: botón flotante -->
  <button id="cartFloatBtn" class="cart-float-btn" aria-label="Ver carrito de compras">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="cartBadge" class="cart-badge" style="display:none">0</span>
  </button>

  <!-- Cart: modal datos del cliente -->
  <div id="customerModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Datos del pedido</h3>
        <button id="modalClose" class="modal-close" title="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <label for="customerName">Nombre y Apellido <span class="required-star">*</span></label>
        <input id="customerName" type="text" placeholder="Ej: Juan Pérez" autocomplete="name" />
        <label for="customerShop">Nombre del comercio <span class="required-star">*</span></label>
        <input id="customerShop" type="text" placeholder="Ej: Almacén El Sol" autocomplete="organization" />
      </div>
      <div class="modal-footer">
        <button id="modalCancel" class="btn-modal-cancel">Cancelar</button>
        <button id="modalSend" class="btn-modal-send">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <!-- jsPDF + autoTable via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="./app.js"></script>
  <script src="./cart.js"></script>
</body>
</html>
