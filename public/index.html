<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo | Distribuidora DAMAR</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="/images/logo.png" alt="Damar" onerror="this.style.display='none'" />
      <div>
        <h1>Distribuidora DAMAR</h1>
        <p>Catálogo de productos</p>
      </div>
    </div>
    <div class="meta" id="metaInfo">Cargando catálogo...</div>
  </header>

  <main class="container">
    <section class="search-panel">
      <label for="searchInput">Buscar por código o descripción</label>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Ej: 7791234567890 o shampoo..." />
        <button id="exportPdfBtn" class="btn-export" title="Exportar lista actual a PDF">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          Exportar PDF
        </button>
      </div>
    </section>

    <section id="status" class="status"></section>
    <section id="productsGrid" class="grid"></section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="img-wrapper"><img class="product-img" src="" alt="" /><div class="img-placeholder">Sin imagen</div></div>
      <div class="card-body">
        <div class="code"></div>
        <h2 class="desc"></h2>
        <div class="price"></div>
      </div>
    </article>
  </template>

  <!-- jsPDF + autoTable via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
