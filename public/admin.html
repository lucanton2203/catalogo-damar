<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Actualizar Catálogo DAMAR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 2.5rem;
      max-width: 480px;
      width: 100%;
    }

    .card h1 {
      font-size: 1.4rem;
      color: #1a202c;
      margin-bottom: 0.25rem;
    }

    .card .subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.4rem;
      margin-top: 1rem;
    }

    input[type="password"],
    input[type="file"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      background: #f7fafc;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="password"]:focus,
    input[type="file"]:focus {
      border-color: #3182ce;
      background: #fff;
    }

    button[type="submit"] {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.7rem;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #2c5282;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #mensaje {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.92rem;
      display: none;
    }

    #mensaje.ok {
      background: #c6f6d5;
      color: #276749;
      border: 1px solid #9ae6b4;
    }

    #mensaje.error {
      background: #fed7d7;
      color: #9b2c2c;
      border: 1px solid #fc8181;
    }

    .back-link {
      display: block;
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.88rem;
      color: #3182ce;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Panel de Administración</h1>
    <p class="subtitle">Distribuidora DAMAR – Actualizar lista de precios</p>

    <div style="background:#fff3cd;border:1px solid #ffeaa7;border-radius:8px;padding:1.25rem;margin-bottom:1rem;text-align:center">
      <h3 style="color:#856404;margin-bottom:0.5rem;font-size:1.05rem">Actualizacion deshabilitada</h3>
      <p style="color:#856404;font-size:0.92rem;line-height:1.5">
        El catalogo se actualiza exclusivamente desde la PC del administrador.<br>
        Usa el acceso directo <strong>"ACTUALIZAR - Catalogo DAMAR"</strong> en el escritorio.
      </p>
    </div>

    <a class="back-link" href="/">← Volver al catalogo</a>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const btn = document.getElementById('btnSubir');
    const msgEl = document.getElementById('mensaje');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.style.display = 'none';
      msgEl.className = '';

      const password = document.getElementById('password').value;
      const fileInput = document.getElementById('excel');
      const file = fileInput.files[0];

      if (!file) {
        showMsg('error', 'Seleccioná un archivo Excel antes de subir.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Subiendo...';

      const formData = new FormData();
      formData.append('password', password);
      formData.append('excel', file);

      try {
        const res = await fetch('/admin/upload', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.ok) {
          showMsg('ok', `¡Catálogo actualizado! Se cargaron <strong>${data.totalProductos}</strong> productos.`);
          form.reset();
        } else {
          showMsg('error', data.error || 'Error desconocido al procesar el archivo.');
        }
      } catch (err) {
        showMsg('error', 'No se pudo conectar con el servidor. Intentá de nuevo.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Subir y actualizar catálogo';
      }
    });

    function showMsg(type, html) {
      msgEl.className = type;
      msgEl.innerHTML = html;
      msgEl.style.display = 'block';
    }
  </script>
</body>
</html>
